name: Build and release LaTeX book

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Rename PDF
        run: mv main.pdf high-energy-recipes.pdf

      - name: Create or update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest PDF
          body: |
            Automatically generated PDF from the latest commit on master.

            Commit: ${{ github.sha }}
          files: high-energy-recipes.pdf
          make_latest: true
